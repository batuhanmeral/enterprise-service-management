{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Giriş — Dispatch" %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <!-- Kayıtlı tema tercihini uygula (flash önleme) -->
    <script>
        (function () {
            const saved = localStorage.getItem('dispatch-theme');
            if (saved) {
                document.documentElement.setAttribute('data-bs-theme', saved);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            }
        })();
    </script>
</head>
<body>

    <div class="auth-wrap">
        <div class="auth-card">

            <!-- Marka -->
            <div class="text-center mb-4">
                <div class="auth-title">Dispatch</div>
                <p class="text-muted small mb-0">{% trans "Devam etmek için giriş yapın" %}</p>
            </div>

            <!-- Bildirim mesajları -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show py-2" role="alert">
                        <small>{{ message }}</small>
                        <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Giriş formu -->
            <div class="card border-0">
                <div class="card-body p-4 p-sm-5">
                    <form method="post" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">{% trans "Kullanıcı Adı" %}</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text"
                                       name="username"
                                       id="id_username"
                                       class="form-control"
                                       placeholder="{% trans 'Kullanıcı adınız' %}"
                                       autofocus
                                       required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="id_password" class="form-label">{% trans "Şifre" %}</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       name="password"
                                       id="id_password"
                                       class="form-control"
                                       placeholder="{% trans 'Şifreniz' %}"
                                       required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark w-100">
                            <i class="bi bi-box-arrow-in-right me-1"></i>{% trans "Giriş Yap" %}
                        </button>
                    </form>
                </div>
            </div>

            <!-- Kayıt linki -->
            <div class="text-center mt-3">
                <small class="text-muted">
                    {% trans "Hesabınız yok mu?" %}
                    <a href="{% url 'identity:register' %}" class="text-decoration-none">{% trans "Kayıt olun" %}</a>
                </small>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
