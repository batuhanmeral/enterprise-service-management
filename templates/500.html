{% load i18n %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "500 — Sunucu Hatası" %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh;
               font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .error-code { font-size: 6rem; font-weight: 800; opacity: 0.15; line-height: 1; letter-spacing: -0.04em; }
        .error-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    </style>
</head>
<body class="bg-light text-center">
    <div>
        <div class="error-code">500</div>
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        <h2 class="h4 mb-3">{% trans "Sunucu Hatası" %}</h2>
        <p class="text-muted mb-4">
            {% trans "Beklenmeyen bir hata oluştu." %}<br>
            {% trans "Lütfen daha sonra tekrar deneyin veya sistem yöneticisiyle iletişime geçin." %}
        </p>
        <a href="/" class="btn btn-dark">
            <i class="bi bi-house me-1"></i>{% trans "Ana Sayfa" %}
        </a>
    </div>
</body>
</html>
